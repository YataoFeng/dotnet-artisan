name: Auto-Evolve

on:
  schedule:
    - cron: '47 2 * * *'  # daily 10:47 AM Beijing
  workflow_dispatch:
    inputs:
      source:
        description: 'Upstream repo to learn from'
        required: true
        type: choice
        options:
          - both
          - dotnet/skills
          - codewithmukesh/dotnet-claude-kit

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    strategy:
      matrix:
        repo:
          - dotnet/skills
          - codewithmukesh/dotnet-claude-kit
    steps:
      - uses: actions/checkout@v4

      - name: Skip if not target
        if: github.event_name == 'workflow_dispatch' && inputs.source != 'both' && inputs.source != matrix.repo
        run: echo "Skipping ${{ matrix.repo }}" && exit 0

      - name: Clone upstream
        run: git clone --depth 50 "https://github.com/${{ matrix.repo }}.git" /tmp/upstream

      - name: Detect new skill files
        id: diff
        run: |
          cd /tmp/upstream
          git diff --name-only HEAD~10..HEAD -- '*.md' > /tmp/changed.txt
          echo "count=$(wc -l < /tmp/changed.txt)" >> $GITHUB_OUTPUT
          cat /tmp/changed.txt || true

      - name: Fetch changed content
        if: steps.diff.outputs.count > 0
        run: |
          truncate -s 0 /tmp/content.md
          head -5 /tmp/changed.txt | while read f; do
            [ -f "/tmp/upstream/$f" ] || continue
            echo "--- $f ---" >> /tmp/content.md
            head -200 "/tmp/upstream/$f" >> /tmp/content.md
            echo -e "\n" >> /tmp/content.md
          done
          wc -c /tmp/content.md

      - name: AI analysis (GitHub Models free tier)
        id: ai
        if: steps.diff.outputs.count > 0
        run: |
          CONTENT=$(head -c 24000 /tmp/content.md)
          PROMPT='Analyze changed .NET skill files. Output JSON:{"summary":"1 sentence","new_anti_patterns":[{"name":"...","bad":"// short BAD code","good":"// short GOOD code","file_to_update":"skills/.../references/xxx.md","importance":"high|medium|low"}],"new_patterns":[{"name":"...","description":"...","file_to_update":"...","importance":"high|medium|low"}],"new_tech":[{"name":"...","description":"...","file_to_update":"...","importance":"high|medium|low"}]}. Only include medium+ importance. Output ONLY valid JSON.'

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" --arg c "$CONTENT" '{
              messages:[{role:"system",content:$p},{role:"user",content:$c}],
              model:"gpt-4o-mini",temperature:0.3,max_tokens:4096,
              response_format:{type:"json_object"}}')")
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > /tmp/ai.json 2>/dev/null || echo '{"summary":"AI unavailable"}' > /tmp/ai.json
          echo "AI analysis: $(jq -r '.summary' /tmp/ai.json)"

      - name: Apply anti-patterns to files
        if: steps.ai.outcome == 'success'
        run: |
          jq -r '.new_anti_patterns // [] | .[] | "\(.file_to_update)|||\(.name)|||\(.bad)|||\(.good)"' /tmp/ai.json | while IFS='|||' read -r file name bad good; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && echo "SKIP: $file not found" && continue
            echo "PATCH: $name → $file"
            cat >> "$file" << PATCH

### $name

```csharp
// BAD
$bad

// GOOD
$good
```
PATCH
          done
          echo "patched=$(git diff --name-only | wc -l)" >> $GITHUB_OUTPUT

      - name: Validate patches
        if: steps.ai.outcome == 'success'
        run: |
          echo "## Validation" >> $GITHUB_STEP_SUMMARY
          # Check no broken internal links
          BROKEN=0
          for f in $(git diff --name-only); do
            grep -oP '\[.*?\]\(\.\.?/[^)]+\)' "$f" 2>/dev/null | sed 's/.*(\(.*\))/\1/' | while read link; do
              target="$(dirname "$f")/${link%.md}.md"
              [ -f "$target" ] && continue
              echo "⚠️ Broken link: $f → $link" >> $GITHUB_STEP_SUMMARY
            done
          done
          # Check no stray DateTime.Now
          STRAY=$(grep -rn 'DateTime\.Now' $(git diff --name-only) | grep -v "BAD\|TimeProvider\|anti-pattern\|速查" | wc -l)
          [ "$STRAY" -gt 0 ] && echo "⚠️ $STRAY DateTime.Now usage(s) found" >> $GITHUB_STEP_SUMMARY
          echo "Validation complete" >> $GITHUB_STEP_SUMMARY

      - name: Create Evolution PR
        if: steps.ai.outcome == 'success'
        id: pr
        run: |
          REPO_NAME=$(echo "${{ matrix.repo }}" | tr '/' '-')
          BRANCH="evolve/${REPO_NAME}-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"

          # Evolution log
          cat > .github/evolution-$REPO_NAME.md << EOF
# Auto-Evolution: ${{ matrix.repo }} ($(date +%Y-%m-%d))

**Summary:** $(jq -r '.summary' /tmp/ai.json)

## New Anti-Patterns
$(jq -r '.new_anti_patterns // [] | map("- **"+.name+"** → `"+.file_to_update+"`") | join("\n")' /tmp/ai.json)

## New Patterns
$(jq -r '.new_patterns // [] | map("- **"+.name+"** → `"+.file_to_update+"`") | join("\n")' /tmp/ai.json)

## New Tech
$(jq -r '.new_tech // [] | map("- **"+.name+"** → `"+.file_to_update+"`") | join("\n")' /tmp/ai.json)

> Powered by GPT-4o-mini (GitHub Models free tier). Review before merging.
EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-evolve: learn from ${{ matrix.repo }}" || true
          git push origin "$BRANCH" 2>/dev/null || true

          gh pr create \
            --title "🤖 Auto-Evolve: ${{ matrix.repo }}" \
            --body "$(cat .github/evolution-$REPO_NAME.md)" \
            --base main --head "$BRANCH" \
            --label "auto-evolution" 2>/dev/null || echo "PR skipped"
        env:
          GH_TOKEN: ${{ github.token }}

  summary:
    needs: evolve
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Auto-Evolution Complete" >> $GITHUB_STEP_SUMMARY
          echo "Checked: dotnet/skills + codewithmukesh/dotnet-claude-kit" >> $GITHUB_STEP_SUMMARY
          echo "Next run: $(date -d '+24 hours' +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
