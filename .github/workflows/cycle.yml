name: Evolution Cycle

# 7-step cycle. Creates PR with REAL content changes for human review.
# 1. Find → 2. Screen → 3. Fetch → 4. Learn → 5. Integrate → 6. Polish → 7. PR

concurrency:
  group: evolution-cycle
  cancel-in-progress: true

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # 1. FIND teachers
      - name: 1. Find .NET teacher repos
        run: |
          echo "## 1. Find" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.github.com/search/repositories?q=dotnet+skills+SKILL.md+claude&sort=updated&per_page=5" \
            | jq -r '.items[] | .full_name' > /tmp/teachers.txt 2>/dev/null
          cat /tmp/teachers.txt >> $GITHUB_STEP_SUMMARY

      # 2. SCREEN with AI — check if any teacher has .NET content worth learning
      - name: 2. Screen teachers (AI)
        id: screen
        run: |
          TEACHERS=$(cat /tmp/teachers.txt | tr '\n' ', ')
          PROMPT="Screen these repos. Output JSON: {\"suitable\":[{\"repo\":\"owner/name\",\"reason\":\"1 sentence why\"}],\"skip\":[\"owner/name\"]}. Suitable = .NET/C# specific, has SKILL.md, teaches new patterns we might not have. Skip = generic, non-.NET, or already known."
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" --arg t "$TEACHERS" '{
              messages:[{role:"system",content:$p},{role:"user",content:$t}],
              model:"gpt-4o-mini",temperature:0.3,max_tokens:512,
              response_format:{type:"json_object"}}')")
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > /tmp/screen.json 2>/dev/null || echo '{"suitable":[]}' > /tmp/screen.json
          jq -r '.suitable[]?.repo // empty' /tmp/screen.json > /tmp/to_learn.txt
          COUNT=$(wc -l < /tmp/to_learn.txt)
          echo "Suitable teachers: $COUNT" >> $GITHUB_STEP_SUMMARY
          cat /tmp/screen.json >> $GITHUB_STEP_SUMMARY
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # 3. FETCH teacher content
      - name: 3. Fetch teacher skills
        if: steps.screen.outputs.count > 0
        run: |
          echo "## 3. Fetch" >> $GITHUB_STEP_SUMMARY
          truncate -s 0 /tmp/teacher_content.md
          while read repo; do
            [ -z "$repo" ] && continue
            echo "Fetching $repo..." >> $GITHUB_STEP_SUMMARY
            git clone --depth 1 "https://github.com/$repo.git" "/tmp/$repo" 2>/dev/null || continue
            find "/tmp/$repo" -name "SKILL.md" -o -name "*.md" | head -5 | while read f; do
              echo "--- $f ---" >> /tmp/teacher_content.md
              head -150 "$f" >> /tmp/teacher_content.md
            done
            rm -rf "/tmp/$repo"
          done < /tmp/to_learn.txt
          echo "Content fetched: $(wc -c < /tmp/teacher_content.md) bytes" >> $GITHUB_STEP_SUMMARY

      # 4. LEARN — AI extracts new anti-patterns
      - name: 4. Learn new patterns (AI)
        id: learn
        if: steps.screen.outputs.count > 0
        run: |
          CONTENT=$(head -c 20000 /tmp/teacher_content.md)
          PROMPT="You are analyzing .NET skill files. Extract NEW anti-patterns (BAD vs GOOD code) that we should integrate. For each: name, short BAD code (one line), short GOOD code (one line), which of our reference files to update (pick from: skills/dotnet-csharp/references/anti-patterns.md, skills/dotnet-api/references/efcore-patterns.md, skills/dotnet-api/references/http-client.md, skills/dotnet-csharp/references/dependency-injection.md, skills/dotnet-api/references/minimal-apis.md, skills/dotnet-api/references/aspire-patterns.md, skills/dotnet-devops/references/containers.md). Only include genuinely NEW patterns we likely don't have. Output JSON: {\"patterns\":[{\"name\":\"...\",\"bad\":\"...\",\"good\":\"...\",\"file\":\"...\"}]}. If nothing new, output {\"patterns\":[]}."
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" --arg c "$CONTENT" '{
              messages:[{role:"system",content:$p},{role:"user",content:$c}],
              model:"gpt-4o-mini",temperature:0.3,max_tokens:2048,
              response_format:{type:"json_object"}}')")
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > /tmp/learned.json 2>/dev/null || echo '{"patterns":[]}' > /tmp/learned.json
          COUNT=$(jq '.patterns | length' /tmp/learned.json)
          echo "New patterns found: $COUNT" >> $GITHUB_STEP_SUMMARY
          jq '.patterns' /tmp/learned.json >> $GITHUB_STEP_SUMMARY
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      # 5. INTEGRATE — apply new patterns to files
      - name: 5. Integrate new patterns
        if: steps.learn.outputs.count > 0
        run: |
          echo "## 5. Integrate" >> $GITHUB_STEP_SUMMARY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          jq -r '.patterns[] | "\(.file)|||\(.name)|||\(.bad)|||\(.good)"' /tmp/learned.json | while IFS='|||' read -r file name bad good; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && echo "⚠️ $file not found, skipping $name" >> $GITHUB_STEP_SUMMARY && continue
            echo "✅ Adding '$name' to $file" >> $GITHUB_STEP_SUMMARY
            echo "" >> "$file"
            echo "### $name" >> "$file"
            echo "" >> "$file"
            echo '```csharp' >> "$file"
            echo "// BAD" >> "$file"
            echo "$bad" >> "$file"
            echo "" >> "$file"
            echo "// GOOD" >> "$file"
            echo "$good" >> "$file"
            echo '```' >> "$file"
            echo "" >> "$file"
          done

          git add -A
          git diff --staged --name-only | grep -q . && git commit -m "🤖 Auto-learn: integrate new anti-patterns from teacher repos" || true
          echo "integrated=$(git diff --name-only origin/main...HEAD 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      # Also run whitespace cleanup even if no new patterns
      - name: 5b. Whitespace cleanup
        run: |
          set +e
          for f in $(find skills -name "*.md" -type f 2>/dev/null | head -100); do
            sed -i 's/[[:space:]]*$//' "$f" 2>/dev/null || true
          done

      # 6. POLISH
      - name: 6. Polish README & Pages
        run: |
          echo "## 6. Polish" >> $GITHUB_STEP_SUMMARY
          [ -f README.md ] && echo "✅ README OK" >> $GITHUB_STEP_SUMMARY
          [ -f docs/index.html ] && echo "✅ Pages OK" >> $GITHUB_STEP_SUMMARY

      # 7. CREATE PR with actual changes
      - name: 7. Create PR for review
        run: |
          BRANCH="evolve/$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "🔄 Auto-evolve $(date +%Y-%m-%d)" || true

          TEACHERS=$(cat /tmp/teachers.txt 2>/dev/null | head -3 | tr '\n' ' | ')
          LEARNED=$(jq '.patterns | length' /tmp/learned.json 2>/dev/null || echo "0")
          FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null | head -10 | sed 's/^/- /')

          BODY="## 🔄 Auto-Evolution $(date +%Y-%m-%d)

          **1. Find**: $TEACHERS
          **2. Screen**: AI checked suitability
          **3. Fetch**: Cloned suitable repos
          **4. Learn**: AI found $LEARNED new pattern(s)
          **5. Integrate**: Applied to reference files
          **6. Polish**: README + Pages OK

          **Changed files:**
          $FILES

          > Auto-generated. Review before merging."

          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$BRANCH"
          gh pr create --title "🤖 Auto-Evolve $(date +%Y-%m-%d)" --body "$BODY" --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Complete
        if: always()
        run: echo "## ✅ Cycle Complete — 1.Find→2.Screen→3.Fetch→4.Learn→5.Integrate→6.Polish→7.PR" >> $GITHUB_STEP_SUMMARY
