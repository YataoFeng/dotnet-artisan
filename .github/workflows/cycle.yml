name: Evolution Cycle

# Follows the 5-step cycle:
# 1. Find teachers → 2. Learn → 3. Optimize self → 4. Polish Pages → 5. Repeat

on:
  schedule:
    - cron: '13 */2 * * *'  # every 2 hours
  push:
    branches: [main]
    paths: ['skills/**', 'docs/**', '.github/workflows/**']
  issues:
    types: [labeled]
  workflow_dispatch:

jobs:
  find-teachers:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]'
    outputs:
      repos_found: ${{ steps.search.outputs.count }}
    steps:
      - name: Step 1 — Find new .NET skill repos
        id: search
        run: |
          echo "## Step 1: Finding teachers" >> $GITHUB_STEP_SUMMARY
          REPOS=$(curl -s "https://api.github.com/search/repositories?q=dotnet+skills+SKILL.md+claude&sort=updated&per_page=5" | jq -r '.items[] | .full_name' 2>/dev/null || echo "")
          echo "$REPOS" > /tmp/teachers.txt
          COUNT=$(wc -l < /tmp/teachers.txt)
          echo "Found $COUNT potential teacher repos" >> $GITHUB_STEP_SUMMARY
          cat /tmp/teachers.txt >> $GITHUB_STEP_SUMMARY
          echo "count=$COUNT" >> $GITHUB_OUTPUT

  learn-and-integrate:
    needs: find-teachers
    if: needs.find-teachers.outputs.repos_found > 0
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Step 2 — Analyze each teacher
        run: |
          echo "## Step 2: Analyzing teachers" >> $GITHUB_STEP_SUMMARY
          while read repo; do
            [ -z "$repo" ] && continue
            echo "Analyzing: $repo" >> $GITHUB_STEP_SUMMARY
            # Fetch repo overview
            curl -s "https://api.github.com/repos/$repo" | jq '{name:.name,desc:.description,stars:.stargazers_count,topics:.topics}' >> /tmp/analysis.json
          done < /tmp/teachers.txt

      - name: Step 3 — Self-optimize skills
        run: |
          echo "## Step 3: Optimizing" >> $GITHUB_STEP_SUMMARY
          # Check our own quality
          BROKEN=$(find skills -name "*.md" -exec grep -l '\[.*\](\.\./[^)]*' {} \; | while read f; do
            grep -oP '\[.*?\]\(\.\.?/[^)]+\)' "$f" | sed 's/.*(\(.*\))/\1/' | while read link; do
              [ -f "$(dirname "$f")/${link%.md}.md" ] && continue
              echo "BROKEN: $f → $link"
            done
          done)
          if [ -n "$BROKEN" ]; then
            echo "⚠️ Broken links found" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No broken links" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Step 4 — Update GitHub Pages
        run: |
          echo "## Step 4: Pages check" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/index.html ]; then
            echo "✅ Pages present" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Pages missing!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Step 5 — Commit improvements
        run: |
          if git diff --name-only | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Cycle: self-optimize from evolution pass" || true
            git push origin HEAD:cycle/$(date +%Y%m%d) 2>/dev/null || true
            echo "✅ Changes committed to cycle branch" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No changes needed — repo is healthy" >> $GITHUB_STEP_SUMMARY
          fi

  loop:
    needs: learn-and-integrate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Cycle Complete" >> $GITHUB_STEP_SUMMARY
          echo "Next cycle: $(date -d '+24 hours' +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "Steps: 1.Find → 2.Learn → 3.Optimize → 4.Polish → 5.Repeat" >> $GITHUB_STEP_SUMMARY
