name: Evolution Cycle

concurrency:
  group: evolution-cycle
  cancel-in-progress: true

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  push:
    branches: [main]
    paths: ['skills/**', 'docs/**', '.github/workflows/**']
  workflow_dispatch:

jobs:
  cycle:
    # Skip if the push was from the bot itself (prevent infinite loops)
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Step 1 — Find new .NET teacher repos
        run: |
          echo "## Step 1: Finding teachers" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.github.com/search/repositories?q=dotnet+skills+SKILL.md+claude&sort=updated&per_page=5" \
            | jq -r '.items[] | .full_name' > /tmp/teachers.txt 2>/dev/null || echo "" > /tmp/teachers.txt
          cat /tmp/teachers.txt >> $GITHUB_STEP_SUMMARY
          echo "Found $(wc -l < /tmp/teachers.txt) potential teachers" >> $GITHUB_STEP_SUMMARY

      - name: Step 2 — Self quality check
        run: |
          echo "## Step 2: Self-check" >> $GITHUB_STEP_SUMMARY
          BROKEN=$(find skills -name "*.md" -print0 2>/dev/null | head -20 | while IFS= read -r -d '' f; do
            grep -oP '\[.*?\]\(\.\.?/[^)]+\)' "$f" 2>/dev/null | sed 's/.*(\(.*\))/\1/' | while read link; do
              target="$(dirname "$f")/${link%.md}.md"
              [ -f "$target" ] && continue
              echo "BROKEN: $f → $link"
            done
          done)
          if [ -n "$BROKEN" ]; then
            echo "⚠️ Broken links" >> $GITHUB_STEP_SUMMARY
            echo "$BROKEN" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No broken links in first 20 files" >> $GITHUB_STEP_SUMMARY
          fi
          # Check stray DateTime
          STRAY=$(grep -rn 'DateTime\.Now' skills --include="*.md" 2>/dev/null | grep -v "BAD\|TimeProvider\|anti-pattern\|速查" | head -5)
          if [ -n "$STRAY" ]; then
            echo "⚠️ Stray DateTime.Now:" >> $GITHUB_STEP_SUMMARY
            echo "$STRAY" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No stray DateTime.Now" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Step 3 — Optimize
        run: |
          echo "## Step 3: Optimize" >> $GITHUB_STEP_SUMMARY
          CHANGED=0
          # Remove trailing whitespace
          find skills -name "*.md" -exec sed -i 's/[[:space:]]*$//' {} \; 2>/dev/null
          if git diff --name-only | grep -q .; then
            echo "Fixed trailing whitespace" >> $GITHUB_STEP_SUMMARY
            CHANGED=1
          else
            echo "✅ No whitespace issues" >> $GITHUB_STEP_SUMMARY
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Step 4 — Verify Pages
        run: |
          echo "## Step 4: Pages check" >> $GITHUB_STEP_SUMMARY
          [ -f docs/index.html ] && echo "✅ Pages OK" >> $GITHUB_STEP_SUMMARY || echo "❌ Missing!" >> $GITHUB_STEP_SUMMARY

      - name: Step 5 — Create PR if changes found
        if: steps.optimize.outputs.changed == '1'
        run: |
          BRANCH="cycle/$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Cycle: auto-optimize (whitespace cleanup)" || true
          git push origin "$BRANCH" 2>/dev/null || true
          gh pr create \
            --title "🔄 Cycle: auto-optimize" \
            --body "Automated whitespace cleanup from the 10-minute evolution cycle. Review and merge." \
            --base main --head "$BRANCH" \
            --label "auto-evolution" 2>/dev/null || echo "PR skipped"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        if: always()
        run: |
          echo "## Cycle Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "Steps: Find → Learn → Optimize → Polish → Repeat" >> $GITHUB_STEP_SUMMARY
          echo "Next: $(date -d '+10 minutes' +%H:%M)" >> $GITHUB_STEP_SUMMARY
