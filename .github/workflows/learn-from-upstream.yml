name: Learn from Upstream

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:
    inputs:
      source:
        description: 'Source repo to check'
        required: true
        type: choice
        options:
          - both
          - dotnet-skills
          - dotnet-claude-kit
        default: both

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      dotnet_skills_changed: ${{ steps.check-skills.outputs.changed }}
      dotnet_claude_kit_changed: ${{ steps.check-kit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check dotnet/skills for new commits
        id: check-skills
        run: |
          LAST_SYNC=$(cat .github/last-sync-skills.txt 2>/dev/null || echo "2026-05-27T00:00:00Z")
          LATEST=$(curl -s https://api.github.com/repos/dotnet/skills/commits/main | jq -r '.commit.committer.date')
          echo "Last sync: $LAST_SYNC"
          echo "Latest commit: $LATEST"
          if [[ "$LATEST" > "$LAST_SYNC" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "latest=$LATEST" >> $GITHUB_OUTPUT
            echo "dotnet/skills has new commits since $LAST_SYNC"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "dotnet/skills is up to date"
          fi

      - name: Check dotnet-claude-kit for new commits
        id: check-kit
        run: |
          LAST_SYNC=$(cat .github/last-sync-kit.txt 2>/dev/null || echo "2026-05-27T00:00:00Z")
          LATEST=$(curl -s https://api.github.com/repos/codewithmukesh/dotnet-claude-kit/commits/main | jq -r '.commit.committer.date')
          echo "Last sync: $LAST_SYNC"
          echo "Latest commit: $LATEST"
          if [[ "$LATEST" > "$LAST_SYNC" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "latest=$LATEST" >> $GITHUB_OUTPUT
            echo "dotnet-claude-kit has new commits since $LAST_SYNC"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "dotnet-claude-kit is up to date"
          fi

  analyze-skills:
    needs: check-upstream
    if: needs.check-upstream.outputs.dotnet_skills_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone dotnet/skills
        run: git clone --depth 1 https://github.com/dotnet/skills.git /tmp/dotnet-skills

      - name: List new or changed skills
        run: |
          echo "## dotnet/skills — New Content to Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find /tmp/dotnet-skills/plugins -name "SKILL.md" -o -name "*.md" | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count skills per plugin
          for plugin in /tmp/dotnet-skills/plugins/*/; do
            name=$(basename "$plugin")
            count=$(find "$plugin" -name "SKILL.md" | wc -l)
            echo "- **$name**: $count skills" >> $GITHUB_STEP_SUMMARY
          done

      - name: Create sync issue
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## dotnet/skills — New Content Detected

            The upstream [dotnet/skills](https://github.com/dotnet/skills) repository has new commits.

            ### Action Required
            Review the latest changes and integrate new knowledge into dotnet-artisan:

            1. Check what's new: https://github.com/dotnet/skills/commits/main
            2. Run Claude Code with dotnet-artisan skills loaded
            3. Let AI analyze and integrate the new content
            4. Push the updated skills

            ### Auto-Integration Command
            \`\`\`bash
            claude "Check dotnet/skills for new content. Compare with our skills at skills/ and integrate any new patterns, anti-patterns, or technology guidance."
            \`\`\`
            `;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['upstream-sync'],
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔄 dotnet/skills has new content to learn from',
                body: summary,
                labels: ['upstream-sync', 'dotnet-skills']
              });
            }

  analyze-kit:
    needs: check-upstream
    if: needs.check-upstream.outputs.dotnet_claude_kit_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone dotnet-claude-kit
        run: git clone --depth 1 https://github.com/codewithmukesh/dotnet-claude-kit.git /tmp/dotnet-claude-kit

      - name: List new or changed skills
        run: |
          echo "## dotnet-claude-kit — New Content to Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find /tmp/dotnet-claude-kit/skills -name "SKILL.md" | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total skills**: $(find /tmp/dotnet-claude-kit/skills -name 'SKILL.md' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Agents**: $(ls /tmp/dotnet-claude-kit/agents/ 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Create sync issue
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## dotnet-claude-kit — New Content Detected

            The upstream [dotnet-claude-kit](https://github.com/codewithmukesh/dotnet-claude-kit) repository has new commits.

            ### Action Required
            Review the latest changes and integrate new good/bad code patterns into dotnet-artisan:

            1. Check what's new: https://github.com/codewithmukesh/dotnet-claude-kit/commits/main
            2. Run Claude Code with dotnet-artisan skills loaded
            3. Let AI analyze and extract new anti-patterns (BAD/GOOD code comparisons)
            4. Append to the appropriate reference files in skills/
            5. Push the updated skills

            ### Auto-Integration Command
            \`\`\`bash
            claude "Check codewithmukesh/dotnet-claude-kit for new content. Extract any new BAD/GOOD code patterns and integrate them into our reference files."
            \`\`\`
            `;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['upstream-sync', 'dotnet-claude-kit'],
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔄 dotnet-claude-kit has new content to learn from',
                body: summary,
                labels: ['upstream-sync', 'dotnet-claude-kit']
              });
            }

  update-timestamp:
    needs: [analyze-skills, analyze-kit]
    if: always() && (needs.analyze-skills.result == 'success' || needs.analyze-kit.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update sync timestamps
        run: |
          mkdir -p .github
          date -u +%Y-%m-%dT%H:%M:%SZ > .github/last-sync-skills.txt
          date -u +%Y-%m-%dT%H:%M:%SZ > .github/last-sync-kit.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-sync-skills.txt .github/last-sync-kit.txt
          git commit -m "Update upstream sync timestamps" || true
          git push
